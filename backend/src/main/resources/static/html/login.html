<!DOCTYPE html>

<html class="light" lang="es"><head>
<meta charset="utf-8"/>

<body class="min-h-screen flex flex-col bg-background text-on-surface">
<!-- TopNavBar -->
<nav class="bg-surface dark:bg-inverse-surface shadow-sm docked full-width top-0 z-50 fixed border-b border-outline-variant/30">
<div class="flex justify-between items-center w-full px-md md:px-lg max-w-max-width mx-margin-desktop h-20">
<div class="flex items-center gap-sm">
<span class="material-symbols-outlined text-primary text-3xl" style="font-variation-settings: 'FILL' 1;">account_balance</span>
<span class="font-title-lg text-title-lg font-bold text-primary dark:text-primary-fixed">Universidad Nacional del Pacífico</span>
</div>
<button onclick="location.href='index.html'"
class="text-on-surface-variant hover:text-secondary transition-colors font-body-md text-body-md flex items-center gap-xs">
<span class="material-symbols-outlined text-sm">arrow_back</span> Volver al Inicio
</button>
</div>
</nav>
<main class="flex-grow flex items-center justify-center px-margin-mobile md:px-lg py-xl">
<div class="max-w-md w-full glass-card rounded-xl p-md md:p-lg animate-in fade-in slide-in-from-bottom-4 duration-700">
<div class="flex flex-col items-center text-center space-y-sm">
<!-- Icon -->
<div class="w-16 h-16 bg-primary-container rounded-full flex items-center justify-center text-on-primary-container mb-xs">
<span class="material-symbols-outlined text-[32px]">admin_panel_settings</span>
</div>
<!-- Title -->
<h1 class="font-headline-lg text-headline-lg text-primary">Iniciar Sesión</h1>
<p class="font-body-md text-on-surface-variant">
Acceso exclusivo para administradores del sistema.
</p>
<!-- Error Message -->
<div id="loginError" class="hidden w-full p-sm bg-error-container/20 border border-error/30 rounded-lg text-error text-body-md text-left">
Credenciales incorrectas. Intente nuevamente.
</div>
<!-- Form -->
<form id="loginForm" class="w-full space-y-md pt-sm">
<!-- Username -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant">Usuario</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">person</span>
<input id="loginUser"
class="w-full rounded-lg border-outline-variant bg-surface pl-10 pr-sm py-xs text-body-md focus:border-secondary focus:ring-1 focus:ring-secondary/20"
placeholder="Ingrese su usuario" type="text" />
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-label-md text-on-surface-variant">Contraseña</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-lg">lock</span>
<input id="loginPass"
class="w-full rounded-lg border-outline-variant bg-surface pl-10 pr-sm py-xs text-body-md focus:border-secondary focus:ring-1 focus:ring-secondary/20"
placeholder="Ingrese su contraseña" type="password" />
</div>
</div>
<!-- Buttons -->
<div class="flex flex-col gap-sm pt-sm">
<button type="submit"
class="w-full bg-secondary text-on-secondary hover:bg-on-secondary-container transition-all px-xl py-sm rounded-lg font-title-lg text-title-lg shadow-md flex items-center justify-center gap-xs">
<span class="material-symbols-outlined">login</span>
Ingresar
</button>
<button type="button" onclick="location.href='index.html'"
class="w-full border border-secondary text-secondary hover:bg-surface-container transition-all px-xl py-sm rounded-lg font-title-lg text-title-lg flex items-center justify-center gap-xs">
<span class="material-symbols-outlined">arrow_back</span>
Volver al Inicio
</button>
</div>
</form>
</div>
</div>
</main>
<script src="../js/api.js"></script>
<script src="../js/login.js"></script>
</body></html>
